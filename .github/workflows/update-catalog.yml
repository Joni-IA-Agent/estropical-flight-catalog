name: Update Flight Catalog

on:
  schedule:
    # Daily at 06:00 UTC (02:00 Bolivia time, before business hours)
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  generate-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the updated XML file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper
        run: python catalog/scraper.py

      - name: Generate XML catalog
        run: python catalog/generate_catalog.py

      - name: Commit and push updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/flights-catalog.xml
          # Exit 0 if nothing changed (no new routes or prices)
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "chore: update flight catalog [$(date -u +%Y-%m-%d)]"
          git push
